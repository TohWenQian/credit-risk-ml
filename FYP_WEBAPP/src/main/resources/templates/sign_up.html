<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRA &mdash; Sign Up</title>
<link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap.min.css}">
<link rel="stylesheet" th:href="@{/css/custom.css}">
</head>

<body class="split-layout-body">

    <div th:replace="~{fragments/style1 :: left-panel}"></div>
    <div class="split-right">
        <div class="page-content">
            <h1 class="form-title">Create Account</h1>
            <p class="form-subtitle">Register to access credit risk analysis</p>

            <form th:action="@{/members/save}" method="post" th:object="${member}">
                <div class="mb-3">
                    <label for="member_name" class="form-label">Full Name</label>
                    <input id="member_name" type="text" class="form-control" th:field="*{name}"
                           required minlength="4" maxlength="50" placeholder="e.g. John Smith">
                    <p class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
                </div>
                <div class="mb-3">
                    <label for="member_username" class="form-label">Username</label>
                    <input id="member_username" type="text" class="form-control" th:field="*{username}"
                           required minlength="2" maxlength="50" placeholder="e.g. johndoe">
                    <p class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
                </div>
                <div class="mb-3">
                    <label for="member_password" class="form-label">Password</label>
                    <input id="member_password" type="password" class="form-control" th:field="*{password}"
                           required minlength="8" maxlength="16" placeholder="Minimum 8 characters">
                    <p class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                </div>
                <div class="mb-3">
                    <label for="member_email" class="form-label">Email Address</label>
                    <input id="member_email" type="email" class="form-control" th:field="*{email}"
                           required placeholder="e.g. john@company.com">
                    <p class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                </div>
                <div class="mb-3" sec:authorize="hasRole('ROLE_ADMIN')">
                    <label for="member_role" class="form-label">Role</label>
                    <select id="member_role" class="form-control" th:field="*{role}" required>
                        <option value="ROLE_USER">ROLE_USER</option>
                        <option value="ROLE_ADMIN">ROLE_ADMIN</option>
                    </select>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary btn-full btn-lg">Register</button>
                </div>
            </form>

            <div class="auth-link">
                Already have an account? <a th:href="@{/login}">Log In</a>
            </div>
        </div>
        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</body>
</html>
