<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>CRA - Sign Up</title>
<link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">
<script src="/bootstrap/js/bootstrap.js"></script>
</head>
<div th:replace="fragments/style1"></div>
<body>
	<div class="right">
		<div th:replace="fragments/header1"></div>
		<div class="content">
			<h1>Sign Up</h1>
			<br>
			<form th:action="@{/members/save}" method="post" th:object="${member}">
				<div class="mb-3 col-5">
					<label for="member_name" class="form-label">Name:</label>
					<input id="member_name" type="text" class="form-control" th:field="*{name}" required minlength=4 maxlength=50 />
					<div class="invalid-feedback">Name should be 4-50 characters.</div>
					<p class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
				</div>
				<div class="mb-3 col-5">
					<label for="member_username" class="form-label">Username:</label>
					<input id="member_username" type="text" class="form-control" th:field="*{username}" required minlength=2 maxlength=50 />
					<div class="invalid-feedback">Username should be 2-50 characters.</div>
					<p class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
				</div>
				<div class="mb-3 col-5">
					<label for="member_password" class="form-label">Password:</label>
					<input id="member_password" type="password" class="form-control" th:field="*{password}" required minlength=8 maxlength=16 />
					<div class="invalid-feedback">Password should be 8-20 characters.</div>
					<p class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
				</div>
				<div class="mb-3 col-5">
					<label for="member_email" class="form-label">Email:</label>
					<input id="member_email" type="email" class="form-control" th:field="*{email}" required minlength=4 maxlength=50 />
					<div class="invalid-feedback">Please enter a valid member email.</div>
					<p class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
				</div>
				<div sec:authorize="hasRole('ROLE_ADMIN')">
					<div class="mb-3 col-5">
						<label for="member_role" class="form-label">Role:</label>
						<select id="member_email" class="form-control" th:field="*{role}" required>
							<option th:value="${role}" th:text="${role}"></option>
							<option th:value="ROLE_USER" th:text="ROLE_USER"></option>
							<option th:value="ROLE_ADMIN" th:text="ROLE_ADMIN"></option>
						</select>
					</div>
				</div>
				<br>
				<div class="mt-3">
					<button type="submit" class="btn btn-primary">Register</button>
				</div>
			</form>
		</div>
	</div>
	<div th:replace="fragments/footer"></div>
</body>
</html>
