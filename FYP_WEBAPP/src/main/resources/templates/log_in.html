<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>CRA - Log In</title>
<link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">
<script src="/bootstrap/js/bootstrap.js"></script>
</head>
<div th:replace="fragments/style1"></div>
<body>
	<div class="right">
		<div th:replace="fragments/header1"></div>
		<div class="content">
			<form class="col-5" th:action="@{/login}" method="post">
				<h1>Log In</h1>
				<br>
				<div class="alert alert-danger" th:if="${param.error}">Invalid
					username or password.</div>
				<div class="alert alert-success" th:if="${param.logout}">You
					have been logged out.</div>
				<label class="form-label" for="username">Username</label> <input
					class="form-control" id="username" name="username" type="text" />
				<br> <label class="form-label" for="password">Password</label>
				<input class="form-control" id="password" name="password"
					type="password" /> <br>
				<div class="mt-3">
					<button class="btn btn-shadow" type="submit">Log in</button>
				</div>
				<br>
			</form>
			<div>
				Not a member yet? Sign Up <a href="/members/add">here</a>!
			</div>
		</div>
	</div>
	<div th:replace="fragments/footer"></div>
</body>
</html>
