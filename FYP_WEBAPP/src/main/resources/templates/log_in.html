<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRA &mdash; Log In</title>
    <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>

<body class="split-layout-body">

    <div th:replace="~{fragments/style1 :: left-panel}"></div>
    <div class="split-right">
        <div class="page-content">
            <h1 class="form-title">Welcome back</h1>
            <p class="form-subtitle">Sign in to your CRA account to continue</p>

            <form th:action="@{/login}" method="post">
                <div th:if="${param.error}" class="alert alert-danger">Invalid username or password.</div>
                <div th:if="${param.logout}" class="alert alert-success">You have been logged out successfully.</div>

                <div class="mb-3">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-control" id="username" name="username" type="text" required
                        autocomplete="username" placeholder="Enter your username">
                </div>
                <div class="mb-3">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-control" id="password" name="password" type="password" required
                        autocomplete="current-password" placeholder="Enter your password">
                </div>
                <div class="mt-4">
                    <button class="btn btn-primary btn-full btn-lg" type="submit">Log In</button>
                </div>
            </form>

            <div class="auth-link">
                Not a member yet? <a href="/members/add">Sign Up</a>
            </div>
        </div>
        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</body>

</html>
