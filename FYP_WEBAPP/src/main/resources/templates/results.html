<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRA &mdash; Risk Assessment Results</title>
<link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap.min.css}">
<link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>

<div th:replace="~{fragments/header2 :: header}"></div>

<div class="report-wrapper">
    <div class="report-inner">

        <div class="report-banner">
            <div>
                <h1>Credit Risk Report</h1>
                <div class="report-meta">Assessment Results</div>
            </div>
            <span class="risk-badge risk-high" th:text="${riskCategory}"></span>
        </div>

        <div class="report-grid">
            <div>
                <div class="report-card">
                    <div class="report-card-head">Key Findings</div>
                    <div class="report-card-body">
                        <div class="report-row">
                            <span class="report-row-label">Risk Category</span>
                            <span class="report-row-value" th:text="${riskCategory}"></span>
                        </div>
                        <div class="report-row">
                            <span class="report-row-label">EBIT / Revenue</span>
                            <span class="report-row-value" th:text="${ebitRevRatio}"></span>
                        </div>
                        <div class="report-row">
                            <span class="report-row-label">Net Cash Flow</span>
                            <span class="report-row-value" th:text="${netCashFlow}"></span>
                        </div>
                        <div class="report-row">
                            <span class="report-row-label">Gross Profit / Revenue</span>
                            <span class="report-row-value" th:text="${grossProfitRev}"></span>
                        </div>
                    </div>
                </div>
                <div class="report-disclaimer">
                    <strong>Disclaimer</strong>
                    This report is for informational purposes only. Do not rely solely on this assessment for credit decisions.
                </div>
                <div style="margin-top:1.25rem">
                    <a th:href="@{/ourservice}" class="btn btn-primary">Run Another Assessment</a>
                </div>
            </div>
            <div>
                <div class="report-card">
                    <div class="report-card-head">Credit Risk Chart</div>
                    <div class="report-card-body">
                        <img th:src="@{/images/results.png}" alt="Credit Risk Chart" class="report-lime-img">
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
