<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRA &mdash; Contact Us</title>
<link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap.min.css}">
<link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>

<div th:replace="~{fragments/header2 :: header}"></div>

<div class="page-hero">
    <div class="page-hero-inner">
        <h1>Get In Touch</h1>
        <p>Reach our team through any of the channels below. We're here to support your credit risk analysis needs.</p>
    </div>
</div>

<div class="page-content-area">
    <div class="contact-grid">
        <a href="https://www.instagram.com/" class="contact-card">
            <div class="contact-icon-box">
                <img th:src="@{/images/isg.png}" alt="Instagram">
            </div>
            <div>
                <div class="contact-card-label">Instagram</div>
                <div class="contact-card-value">@CRA</div>
            </div>
        </a>
        <a href="https://t.me/" class="contact-card">
            <div class="contact-icon-box">
                <img th:src="@{/images/tlg.png}" alt="Telegram">
            </div>
            <div>
                <div class="contact-card-label">Telegram</div>
                <div class="contact-card-value">@CRA</div>
            </div>
        </a>
        <a href="https://wa.me/" class="contact-card">
            <div class="contact-icon-box">
                <img th:src="@{/images/wa.png}" alt="WhatsApp">
            </div>
            <div>
                <div class="contact-card-label">WhatsApp</div>
                <div class="contact-card-value">+65 6123 4567</div>
            </div>
        </a>
        <a href="mailto:cra@gmail.com" class="contact-card">
            <div class="contact-icon-box">
                <img th:src="@{/images/gm.png}" alt="Email">
            </div>
            <div>
                <div class="contact-card-label">Email</div>
                <div class="contact-card-value">CRA@gmail.com</div>
            </div>
        </a>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
