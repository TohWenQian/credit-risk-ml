<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRA &mdash; Edit Member</title>
<link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap.min.css}">
<link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>

<div th:replace="~{fragments/header2 :: header}"></div>

<div class="page-wrapper">

    <div class="page-header">
        <div>
            <h1 class="page-title">Edit Member</h1>
            <div class="page-subtitle-text" th:text="'Editing account: ' + ${member.username}">Editing member account</div>
        </div>
        <a th:href="@{/members}" class="btn btn-secondary">Back to Members</a>
    </div>

    <div class="form-card">
        <div class="form-card-head">
            <h1>Account Details</h1>
        </div>
        <div class="form-card-body">
            <form method="post" th:action="@{/members/edit/{id}(id=${member.id})}" th:object="${member}">

                <!-- preserve existing password hash -->
                <input type="hidden" name="password" th:value="*{password}">

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label for="member_name" class="form-label">Full Name</label>
                        <input id="member_name" type="text" class="form-control" th:field="*{name}"
                               required minlength="4" maxlength="50">
                        <p class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
                    </div>
                    <div class="col-md-6">
                        <label for="member_username" class="form-label">Username</label>
                        <input id="member_username" type="text" class="form-control" th:field="*{username}"
                               required minlength="2" maxlength="50">
                        <p class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label for="member_email" class="form-label">Email Address</label>
                        <input id="member_email" type="email" class="form-control" th:field="*{email}" required>
                        <p class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                    </div>
                    <div class="col-md-6" sec:authorize="hasRole('ROLE_ADMIN')">
                        <label for="member_role" class="form-label">Role</label>
                        <select id="member_role" class="form-control" th:field="*{role}" required>
                            <option value="ROLE_USER">ROLE_USER</option>
                            <option value="ROLE_ADMIN">ROLE_ADMIN</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label for="new_password" class="form-label">
                            New Password
                            <span style="font-size:.75rem;color:#94A3B8;font-weight:400;">(optional &mdash; leave blank to keep current)</span>
                        </label>
                        <input id="new_password" type="password" class="form-control" name="newPassword"
                               minlength="8" maxlength="16" placeholder="Leave blank to keep current password">
                    </div>
                </div>

                <div class="mt-4" style="border-top:1px solid #E2E8F0;padding-top:1.5rem;text-align:right">
                    <a th:href="@{/members}" class="btn btn-secondary" style="margin-right:.75rem">Cancel</a>
                    <button class="btn btn-primary btn-lg" type="submit">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
