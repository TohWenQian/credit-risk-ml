<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>CRA - Edit Company</title>
<link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">
<script src="/bootstrap/js/bootstrap.js"></script>
</head>
<div th:replace="fragments/style2"></div>
<body>
	<div th:replace="fragments/header2"></div>
	<div class="container">
		<div class="contents">
			<h1>Edit company</h1>
			<br>
			<form method="post" th:action="@{/companies/edit/{id}(id=${company.id})}" th:object="${company}">
				<div class="col-5 mb-3">
					<label class="form-label" for="company_name">Name:</label>
					<input class="form-control" id="company_name" th:field="*{companyName}" type="text" required minlength=4 maxlength=50 />
					<div class="invalid-feedback">Please enter a valid company name.</div>
					<p class="text-danger" th:errors="*{companyName}" th:if="${#fields.hasErrors('companyName')}"></p>
				</div>
				<div class="col-5 mb-3">
					<label class="form-label" for="industry">Industry:</label>
					<input class="form-control" id="industry" th:field="*{industry}" type="text" required minlength=4 maxlength=50 />
					<div class="invalid-feedback">Please enter a valid industry.</div>
					<p class="text-danger" th:errors="*{industry}" th:if="${#fields.hasErrors('industry')}"></p>
				</div>
				<br>
				<div class="mt-3">
					<button class="btn btn-primary" type="submit">Save</button>
				</div>
			</form>
		</div>
	</div>
	<div th:replace="fragments/footer"></div>
</body>
</html>
