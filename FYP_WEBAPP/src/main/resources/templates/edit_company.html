<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRA &mdash; Edit Company</title>
<link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap.min.css}">
<link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>

<div th:replace="~{fragments/header2 :: header}"></div>

<div class="page-wrapper">

    <div class="page-header">
        <div>
            <h1 class="page-title">Edit Company</h1>
            <div class="page-subtitle-text" th:text="'Updating details for: ' + ${company.companyName}">Updating company details</div>
        </div>
        <a th:href="@{/companies}" class="btn btn-secondary">Back to Companies</a>
    </div>

    <div class="form-card">
        <div class="form-card-head">
            <h1>Company Details</h1>
        </div>
        <div class="form-card-body">
            <form method="post" th:action="@{/companies/edit/{id}(id=${company.id})}" th:object="${company}">
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label" for="company_name">Company Name</label>
                        <input class="form-control" id="company_name" th:field="*{companyName}"
                               type="text" required minlength="4" maxlength="50">
                        <p class="text-danger" th:errors="*{companyName}" th:if="${#fields.hasErrors('companyName')}"></p>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="industry">Industry</label>
                        <input class="form-control" id="industry" th:field="*{industry}"
                               type="text" required minlength="4" maxlength="50">
                        <p class="text-danger" th:errors="*{industry}" th:if="${#fields.hasErrors('industry')}"></p>
                    </div>
                </div>
                <div class="mt-4" style="border-top:1px solid #E2E8F0;padding-top:1.5rem;text-align:right">
                    <a th:href="@{/companies}" class="btn btn-secondary" style="margin-right:.75rem">Cancel</a>
                    <button class="btn btn-primary btn-lg" type="submit">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
